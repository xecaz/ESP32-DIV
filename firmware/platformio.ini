; ESP32-DIV v2 firmware
; PlatformIO project, Arduino-on-IDF for ESP32-S3, 16 MB flash
; See /home/xecaz/.claude/plans/in-this-directory-you-zazzy-lark.md for the plan.

[platformio]
default_envs = esp32div

[env:esp32div]
platform = espressif32@~6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; 16 MB flash, custom partition layout (see partitions_16mb.csv).
board_upload.flash_size = 16MB
board_build.partitions = partitions_16mb.csv

; Serial ports
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
upload_speed = 921600

; Enable native USB-OTG for TinyUSB composite (MSC/CDC/HID); the CP2102 on
; /dev/ttyUSB0 remains the flashing path.
build_flags =
    ; USB-OTG composite mode: native USB device via TinyUSB (MSC/CDC/HID).
    ; CP2102 on /dev/ttyUSB0 still handles flashing; Serial output now
    ; lands on /dev/ttyACM0 via native USB when the cable is plugged in.
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCFG_TUD_MSC=1
    ; Board has no PSRAM — do NOT define BOARD_HAS_PSRAM.
    ; Debug level 1 = ERROR only.
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++14
    ; TFT_eSPI and SmartRC-CC1101-Driver-Lib both declare a global `spi`
    ; symbol in different .cpp files. Both survive DCE because they're
    ; referenced at load. Allow multiple definitions and take the first
    ; (TFT_eSPI's) — CC1101 doesn't actually *use* its global `spi`; it
    ; uses the one we configure explicitly via setSpiPin().
    -Wl,--allow-multiple-definition
    ; TFT_eSPI configuration (mirrors cifertech upstream User_Setup.h exactly,
    ; bundled under Libraries/TFT_eSPI-master.zip). USE_HSPI_PORT is load-bearing
    ; on ESP32-S3 — without it, tft.init() crashes in begin_tft_write().
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=37
    -DTFT_MOSI=35
    -DTFT_SCLK=36
    -DTFT_CS=17
    -DTFT_DC=16
    -DTFT_RST=0
    -DTOUCH_CS=18
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

; No PSRAM on this board — use qio_qspi (flash only).
board_build.arduino.memory_type = qio_qspi

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    nrf24/RF24@^1.4.11
    sui77/rc-switch@^2.6.4
    fastled/FastLED@^3.7.7
    bblanchon/ArduinoJson@^7.2.0
    h2zero/NimBLE-Arduino@^2.0.0
    crankyoldgit/IRremoteESP8266@^2.8.6
    adafruit/Adafruit NeoPixel@^1.12.0
    lsatan/SmartRC-CC1101-Driver-Lib@^2.5.7
    ; PCF8574 is driven directly via Wire.h — no library dependency.

; TFT_eSPI pin/driver config is provided via build_flags above (USER_SETUP_LOADED),
; so the library's User_Setup.h is ignored. CC1101 (SmartRC-CC1101-Driver-Lib)
; is vendored under lib/ so we match the exact version used upstream.
