<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in to Wi-Fi</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/logo.svg" alt="" class="logo" onerror="this.style.display='none'">
      <h1>Wi-Fi access</h1>
      <p class="subtle">Sign in to continue to the internet</p>
    </div>

    <form action="/submit" method="POST" autocomplete="on">
      <label for="u">Email or username</label>
      <input id="u" name="u" type="text" autocomplete="username" required>

      <label for="p">Password</label>
      <input id="p" name="p" type="password" autocomplete="current-password" required>

      <button type="submit">Connect</button>
    </form>

    <p class="legal">
      By connecting you agree to the terms of service.
      This network is provided free of charge.
    </p>
  </main>
</body>
</html>
